- id: fact-001
  category: competitive_intelligence
  title: "Bing is the primary pipeline for ChatGPT visibility"
  content: "87% of SearchGPT citations match Bing's top organic results. Google only 56% match. ChatGPT simplifies complex queries before searching Bing. GPT memory has zero impact on citation patterns."
  source: "Seer Interactive (Feb 2025) + SEL case study (Apr 6, 2026)"
  status: active
  discovered: "2026-04-14"
  product_implication: "Bing rank tracking is CRITICAL. Must also track simplified query variants in Bing, not just exact-match queries."

- id: fact-002
  category: market_research
  title: "AI search adoption skews heavily toward high-income households"
  content: "ChatGPT regular usage: £25-30k ~18%, £50-60k ~30%, £70-80k ~49%, £100k+ ~48-58%. High-income 2-3x more likely to use ChatGPT."
  source: "Reflect Digital research via SEL (Apr 13, 2026)"
  status: active
  discovered: "2026-04-14"
  product_implication: "Validates B2B premium positioning. Target AI-first, high-income decision-makers."

- id: fact-003
  category: competitive_intelligence
  title: "Google Web Guide is a click-friendly AI SERP experiment"
  content: "Google Web Guide uses query fan-out like AI Mode/AIOs but presents results as clickable link cards under themed headers. Every result is clickable. Uses FastSearch/RankEmbed. Cheaper than full AI answers. Solves Google's ad revenue problem. Currently Search Labs opt-in."
  source: "Ahrefs blog (Mar 26, 2026)"
  status: active
  discovered: "2026-04-14"
  product_implication: "New optimization surface. Topical cluster detection and optimization. First-mover advantage if Web Guide graduates from Search Labs."

- id: fact-004
  category: competitive_intelligence
  title: "AI summaries drive SEO impact; AI buttons do not"
  content: "AI summaries + buttons: +116% impressions, +36% clicks. Buttons alone: +5% impressions, -17% clicks. Site-wide: 79.4% impression increase with only 15% of content having summaries."
  source: "Leite's Culinaria case study via SEL (Apr 13, 2026)"
  status: active
  discovered: "2026-04-14"
  product_implication: "Autopilot should auto-generate TL;DR summaries. This is a concrete, defensible feature no competitor automates."

- id: fact-005
  category: competitive_intelligence
  title: "Profound silent 15+ days as of Apr 14 — NOW BROKEN SILENCE"
  content: "Profound's last blog post was March 31. Zero output since April 8 Zero Click SF event. BUT: homepage now shows Agents product launch. Profound broke silence with autonomous agents."
  source: "Direct observation"
  status: superseded
  discovered: "2026-04-14"
  superseded_by: "fact-006"
